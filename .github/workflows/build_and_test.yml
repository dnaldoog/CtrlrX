name: Pamplejuce

on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run with tmate debugging'
        required: false
        default: false
  push:
  pull_request:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  BUILD_DIR: build
  DISPLAY: :0
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  SCCACHE_GHA_ENABLED: true
  SCCACHE_CACHE_MULTIARCH: 1
  IPP_DIR: C:\Program Files (x86)\Intel\oneAPI\ipp\latest\lib\cmake\ipp

defaults:
  run:
    shell: bash

jobs:
  build_and_test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      HAVE_MACOS_SIGNING_SECRETS: ${{ secrets.DEV_ID_COMBO_CERT != '' && secrets.DEV_ID_COMBO_PASSWORD != '' && secrets.DEVELOPER_ID_APPLICATION != '' && secrets.DEVELOPER_ID_INSTALLER != '' && secrets.NOTARIZATION_USERNAME != '' && secrets.NOTARIZATION_PASSWORD != '' && secrets.TEAM_ID != '' }}
      HAVE_AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET != '' }}
      HAVE_GPG_KEY: ${{ secrets.GPG_SIGNING_KEY != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            pluginval-binary: ./pluginval
            extra-flags: -G Ninja -DJUCE_LINUX=1
          - name: macOS
            os: macos-14
            pluginval-binary: pluginval.app/Contents/MacOS/pluginval
            extra-flags: -G Ninja -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          - name: Windows
            os: windows-2022
            pluginval-binary: ./pluginval.exe

    steps:
      - name: Setup MSVC (Windows)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Clang (Linux)
        if: runner.os == 'Linux'
        uses: egor-tensin/setup-clang@v1

      - name: Install Linux System Deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt install -y libasound2-dev libx11-dev libxinerama-dev libxext-dev libfreetype6-dev libglu1-mesa-dev xvfb ninja-build binutils-dev libboost-dev libcurl4-gnutls-dev libgl1-mesa-dev libglapi-mesa libiberty-dev libsframe1 libudev-dev libxcursor-dev libxrandr-dev xorg-dev
          sudo /usr/bin/Xvfb $DISPLAY &

      - name: Install Windows System Deps
        if: runner.os == 'Windows'
        run: |
          nuget install intelipp.static.win-x64 -Version 2022.2.0.575
          choco install ninja

      - name: Install macOS System Deps
        if: matrix.name == 'macOS'
        run: |
          brew install osxutils boost
          # Use latest Xcode
          sudo xcode-select -s /Applications/Xcode.app

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # --- LUAJIT BUILD SECTION ---
      - name: Build LuaJIT (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          @echo off
          for /d /r %%i in (*luajit) do (
            if exist "%%i\src\msvcbuild.bat" (
              pushd "%%i\src"
              call msvcbuild.bat static
              popd
              exit /b 0
            )
          )
          echo ERROR: LuaJIT msvcbuild.bat not found.
          exit /b 1

      - name: Build LuaJIT (Linux)
        if: runner.os == 'Linux'
        run: |
          LUAJIT_SRC=$(find . -type d -path "*/luajit/src" | head -n 1)
          if [ -z "$LUAJIT_SRC" ]; then echo "LuaJIT not found"; exit 1; fi
          cd "$LUAJIT_SRC"
          make clean
          make -j$(nproc) XCFLAGS="-fPIC"

      - name: Build Universal LuaJIT (macOS)
        if: matrix.name == 'macOS'
        run: |
          LUAJIT_SRC=$(find . -type d -path "*/luajit/src" | head -n 1)
          if [ -z "$LUAJIT_SRC" ]; then echo "LuaJIT not found"; exit 1; fi
          cd "$LUAJIT_SRC"
          
          export MACOSX_DEPLOYMENT_TARGET=10.15

          echo "--- Building x86_64 ---"
          make clean
          # We use environment variables to bypass the Makefile's string parsing
          CC=clang \
          TARGET_SYS=Darwin \
          TARGET_FLAGS="-arch x86_64" \
          make -j$(sysctl -n hw.ncpu)
          
          if [ ! -f libluajit.a ]; then echo "x86_64 build failed"; exit 1; fi
          mv libluajit.a libluajit_x86.a
          
          echo "--- Building arm64 ---"
          make clean
          CC=clang \
          TARGET_SYS=Darwin \
          TARGET_FLAGS="-arch arm64" \
          make -j$(sysctl -n hw.ncpu)
          
          if [ ! -f libluajit.a ]; then echo "arm64 build failed"; exit 1; fi
          mv libluajit.a libluajit_arm.a
          
          echo "--- Creating Universal Binary ---"
          lipo -create libluajit_x86.a libluajit_arm.a -output libluajit.a
          lipo -info libluajit.a
          
      # --- CTRLR SPECIFIC DEPS (Boost Unzip) ---
      - name: Unzip Boost for CtrlrX
        if: runner.os != 'Linux'
        run: |
          if [ "$RUNNER_OS" == "Windows" ] || [ "$RUNNER_OS" == "macOS" ]; then
            cd Source/Misc/
            unzip -o boost/boost.zip
          fi

      - name: Cache with sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Extract Version
        run: |
          if [ -f "VERSION" ]; then
            # Find the first Jucer file and extract the version string
            JUCER=$(find . -name "Ctrlr*.jucer" -type f | head -n 1)
            if [ -n "$JUCER" ]; then
              echo "Extracting version from $JUCER"
              sed -n 's/.*version="\([^"]*\)".*/\1/p' "$JUCER" | head -n 1 > VERSION
            fi
          fi
          echo "Build Version: $(cat VERSION)"
