name: Pamplejuce
on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: Run with tmate debugging
        required: false
        default: false
  push:
    branches:
      - main
      - 5.6.35-Maintenance-LuaJIT
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  BUILD_DIR: build
  DISPLAY: :0
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  SCCACHE_GHA_ENABLED: true
  SCCACHE_CACHE_MULTIARCH: 1
  IPP_DIR: C:\Program Files (x86)\Intel\oneAPI\ipp\latest\lib\cmake\ipp

defaults:
  run:
    shell: bash

jobs:
  build_and_test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            pluginval-binary: ./pluginval
            extra-flags: -G Ninja -DJUCE_LINUX=1
          - name: macOS
            os: macos-14
            pluginval-binary: pluginval.app/Contents/MacOS/pluginval
            extra-flags: -G Ninja -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          - name: Windows
            os: windows-2022
            pluginval-binary: ./pluginval.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Clang (Linux)
        if: runner.os == 'Linux'
        uses: egor-tensin/setup-clang@v1

      - name: Install System Deps
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update
            sudo apt install -y libasound2-dev libx11-dev libxinerama-dev libxext-dev libfreetype6-dev libglu1-mesa-dev xvfb ninja-build binutils-dev libboost-dev libcurl4-gnutls-dev libgl1-mesa-dev libglapi-mesa libiberty-dev libsframe1 libudev-dev libxcursor-dev libxrandr-dev xorg-dev
            sudo /usr/bin/Xvfb $DISPLAY &
          elif [ "$RUNNER_OS" == "Windows" ]; then
            nuget install intelipp.static.win-x64 -Version 2022.2.0.575
            choco install ninja
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install osxutils boost
            sudo xcode-select -s /Applications/Xcode.app
          fi

      - name: Build LuaJIT (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd Source\Misc\luajit\src
          call msvcbuild.bat static

      - name: Build LuaJIT (Unix-like)
        if: runner.os != 'Windows'
        run: |
          cd Source/Misc/luajit/src
          if [ "$RUNNER_OS" == "macOS" ]; then
            make clean
            make -j$(sysctl -n hw.ncpu) CC="clang -arch x86_64" CROSS="clang -arch x86_64" TARGET_FLAGS="-arch x86_64" MACOS_DEPLOYMENT_TARGET=10.15
            mv libluajit.a libluajit_x86.a
            make clean
            make -j$(sysctl -n hw.ncpu) CC="clang -arch arm64" CROSS="clang -arch arm64" TARGET_FLAGS="-arch arm64" MACOS_DEPLOYMENT_TARGET=10.15
            mv libluajit.a libluajit_arm.a
            lipo -create libluajit_x86.a libluajit_arm.a -output libluajit.a
          else
            make clean
            make -j$(nproc) XCFLAGS="-fPIC"
          fi

      - name: Unzip Boost
        if: runner.os != 'Linux'
        run: |
          cd Source/Misc/
          unzip -o boost/boost.zip

      - name: Cache with sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure and Build
        run: |
          cmake -B ${{ env.BUILD_DIR }} ${{ matrix.extra-flags }} -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }}

      - name: Create Release Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.BUILD_DIR }}/**/*.exe
            ${{ env.BUILD_DIR }}/**/*.vst3
            ${{ env.BUILD_DIR }}/**/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
