name: Pamplejuce
on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: Run with tmate debugging
        required: false
        default: false
  push:
    branches:
      - '**'
    tags:
      - v*
  pull_request: null

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  BUILD_DIR: build
  PRODUCT_NAME: CtrlrX
  PROJECT_NAME: CtrlrX
  DISPLAY: :0
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  SCCACHE_GHA_ENABLED: true
  SCCACHE_CACHE_MULTIARCH: 1
  IPP_DIR: C:\Program Files (x86)\Intel\oneAPI\ipp\latest\lib\cmake\ipp

defaults:
  run:
    shell: bash

jobs:
  build_and_test:
    if: "github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name"
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      HAVE_MACOS_SIGNING_SECRETS: ${{ secrets.DEV_ID_COMBO_CERT != '' &&
        secrets.DEV_ID_COMBO_PASSWORD != '' && secrets.DEVELOPER_ID_APPLICATION
        != '' && secrets.DEVELOPER_ID_INSTALLER != '' &&
        secrets.NOTARIZATION_USERNAME != '' && secrets.NOTARIZATION_PASSWORD !=
        '' && secrets.TEAM_ID != '' }}
      HAVE_AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET != '' }}
      HAVE_GPG_KEY: ${{ secrets.GPG_SIGNING_KEY != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            pluginval-binary: ./pluginval
            extra-flags: -G Ninja -DJUCE_LINUX=1
          - name: macOS
            os: macos-14
            pluginval-binary: pluginval.app/Contents/MacOS/pluginval
            extra-flags: -G Ninja -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          - name: Windows
            os: windows-2022
            pluginval-binary: ./pluginval.exe

    steps:
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Clang (Linux)
        if: runner.os == 'Linux'
        uses: egor-tensin/setup-clang@v1

      - name: Install Linux System Deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt install -y \
            libasound2-dev libx11-dev libxinerama-dev libxext-dev \
            libfreetype6-dev libglu1-mesa-dev xvfb ninja-build \
            binutils-dev libboost-dev libcurl4-gnutls-dev libgl1-mesa-dev \
            libglapi-mesa libiberty-dev libsframe1 libudev-dev \
            libxcursor-dev libxrandr-dev xorg-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libluajit-5.1-dev unzip
          # Alias webkit 4.1 to 4.0 so CMake finds it
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
                      /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc
          sudo /usr/bin/Xvfb $DISPLAY &

      - name: Install Windows System Deps
        if: runner.os == 'Windows'
        run: |
          nuget install intelipp.static.win-x64 -Version 2022.2.0.575
          choco install ninja

      - name: Install macOS System Deps
        if: matrix.name == 'macOS'
        run: |
          brew install osxutils boost luajit
          echo "PKG_CONFIG_PATH=$(brew --prefix luajit)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          sudo xcode-select -s /Applications/Xcode.app

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Extract LuaJIT from Source/Resources/luajit.zip
      # -----------------------------------------------------------------------
      - name: Extract LuaJIT (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ZIP=$(find . -name "luajit.zip" | head -n 1)
          if [ -n "$ZIP" ]; then
            echo "Found zip at: $ZIP"
            unzip -o "$ZIP" -d "Source/Misc/"
            echo "Extraction complete."
          else
            echo "luajit.zip not found - skipping extraction"
          fi

      - name: Extract LuaJIT (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path "Source" -Recurse -Filter "luajit.zip" | Select-Object -First 1
          if ($zip) {
            Write-Host "Found zip at: $($zip.FullName)"
            Expand-Archive -Path $zip.FullName -DestinationPath "Source/Misc/" -Force
            Write-Host "Extraction complete."
          } else {
            Write-Host "luajit.zip not found"
            exit 1
          }

      # -----------------------------------------------------------------------
      # Build LuaJIT per platform
      # -----------------------------------------------------------------------
      - name: Build LuaJIT (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          @echo off
          if exist "Source\Misc\luajit\src\msvcbuild.bat" (
            pushd "Source\Misc\luajit\src"
            call msvcbuild.bat static
            popd
            echo LuaJIT built successfully.
            exit /b 0
          )
          echo ERROR: LuaJIT msvcbuild.bat not found.
          exit /b 1

      - name: Build LuaJIT (Linux)
        if: runner.os == 'Linux'
        run: |
          LUAJIT_SRC=$(find . -type d -path "*/luajit/src" | head -n 1)
          if [ -z "$LUAJIT_SRC" ]; then
            echo "LuaJIT source not found - using system libluajit-5.1-dev"
            exit 0
          fi
          cd "$LUAJIT_SRC"
          make clean
          make -j$(nproc) XCFLAGS="-fPIC"

      - name: Build Universal LuaJIT (macOS)
        if: matrix.name == 'macOS'
        run: |
          LUAJIT_SRC=$(find . -type d -path "*/luajit/src" | head -n 1)
          if [ -z "$LUAJIT_SRC" ]; then
            echo "LuaJIT source not found - using Homebrew luajit"
            exit 0
          fi
          cd "$LUAJIT_SRC"
          export MACOSX_DEPLOYMENT_TARGET=10.15
          echo "--- Building x86_64 ---"
          make clean
          CC=clang TARGET_SYS=Darwin TARGET_FLAGS="-arch x86_64" make -j$(sysctl -n hw.ncpu)
          mv libluajit.a libluajit_x86.a
          echo "--- Building arm64 ---"
          make clean
          CC=clang TARGET_SYS=Darwin TARGET_FLAGS="-arch arm64" make -j$(sysctl -n hw.ncpu)
          mv libluajit.a libluajit_arm.a
          lipo -create libluajit_x86.a libluajit_arm.a -output libluajit.a
          lipo -info libluajit.a

      # -----------------------------------------------------------------------
      # Boost, sccache, version
      # -----------------------------------------------------------------------
      - name: Unzip Boost for CtrlrX
        if: runner.os != 'Linux'
        run: |
          BOOST_ZIP=$(find . -name "boost.zip" | head -n 1)
          if [ -n "$BOOST_ZIP" ]; then
            unzip -o "$BOOST_ZIP" -d $(dirname "$BOOST_ZIP")
          fi

      - name: Cache with sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Extract Version
        run: |
          echo "0.0.0" > VERSION
          JUCER=$(find . -name "Ctrlr*.jucer" -type f | head -n 1)
          if [ -n "$JUCER" ]; then
            sed -n 's/.*version="\([^"]*\)".*/\1/p' "$JUCER" | head -n 1 > VERSION
          fi
          echo "VERSION_TAG=$(cat VERSION)" >> $GITHUB_ENV
          echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # CMake configure and build
      # -----------------------------------------------------------------------
      - name: Configure CMake
        run: |
          cmake -B ${{ env.BUILD_DIR }} \
                -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
                -DCTRLRX_USE_LUAJIT=ON \
                ${{ matrix.extra-flags }}

      - name: Build Project
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }}

      # -----------------------------------------------------------------------
      # cmake/GitHubENV.cmake writes .env during the build (confirmed present
      # in this repo) with PROJECT_NAME, PRODUCT_NAME, VERSION, BUNDLE_ID,
      # COMPANY_NAME etc. This is the authoritative version source on macOS -
      # it overrides the .jucer-regex VERSION/VERSION_TAG set in "Extract
      # Version" above, since CMake's PamplejuceVersion is ground truth.
      # -----------------------------------------------------------------------
      - name: Read in .env from CMake (macOS)
        if: matrix.name == 'macOS'
        run: |
          cat .env
          cat .env >> $GITHUB_ENV

      - name: Set artifact path vars (macOS)
        if: matrix.name == 'macOS'
        run: |
          ARTIFACTS_PATH=${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}
          echo "ARTIFACTS_PATH=$ARTIFACTS_PATH" >> $GITHUB_ENV
          echo "VST3_PATH=$ARTIFACTS_PATH/VST3/${{ env.PRODUCT_NAME }}.vst3" >> $GITHUB_ENV
          echo "AU_PATH=$ARTIFACTS_PATH/AU/${{ env.PRODUCT_NAME }}.component" >> $GITHUB_ENV
          echo "STANDALONE_PATH=$ARTIFACTS_PATH/Standalone/${{ env.PRODUCT_NAME }}.app" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-LuaJIT-${{ matrix.name }}" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # macOS: build an UNSIGNED .pkg installer instead of a flat zip.
      # This installs VST3/AU/Standalone to the correct system paths via
      # pkgbuild's --install-location, fixing the wrong-path issue that was
      # likely behind the user's "VST3 just doesn't work" report.
      # No --sign / no notarytool / no stapler - those need real Dev ID certs.
      # -----------------------------------------------------------------------
      - name: Build Unsigned Installer Package (macOS)
        if: matrix.name == 'macOS'
        run: |
          mkdir -p Packaging

          pkgbuild --identifier "${{ env.BUNDLE_ID }}.au.pkg" \
                    --version "${{ env.VERSION }}" \
                    --component "${{ env.AU_PATH }}" \
                    --install-location "/Library/Audio/Plug-Ins/Components" \
                    "Packaging/${{ env.PRODUCT_NAME }}.au.pkg"

          pkgbuild --identifier "${{ env.BUNDLE_ID }}.vst3.pkg" \
                    --version "${{ env.VERSION }}" \
                    --component "${{ env.VST3_PATH }}" \
                    --install-location "/Library/Audio/Plug-Ins/VST3" \
                    "Packaging/${{ env.PRODUCT_NAME }}.vst3.pkg"

          # Standalone needs the relocatable flag turned off so it always
          # installs to /Applications rather than wherever the user drags it
          pkgbuild --analyze --root "$(dirname "${{ env.STANDALONE_PATH }}")" standalone.plist
          plutil -replace BundleIsRelocatable -bool NO standalone.plist
          pkgbuild --identifier "${{ env.BUNDLE_ID }}.app.pkg" \
                    --version "${{ env.VERSION }}" \
                    --root "$(dirname "${{ env.STANDALONE_PATH }}")" \
                    --component-plist standalone.plist \
                    --install-location "/Applications" \
                    "Packaging/${{ env.PRODUCT_NAME }}.app.pkg"

          # Packaging/Mac/distribution.xml.template (background.png lines
          # removed) and Packaging/resources/{EULA,README} confirmed present
          # on this fork.
          cd Packaging
          envsubst < ./Mac/distribution.xml.template > distribution.xml
          # UNSIGNED productbuild - no --sign, no --timestamp
          productbuild --resources ./resources --distribution distribution.xml \
                        "${{ env.ARTIFACT_NAME }}.pkg"

      # -----------------------------------------------------------------------
      # Package non-macOS artifacts (Linux/Windows) - unchanged from before
      # -----------------------------------------------------------------------
      - name: Prepare and Zip Artifacts (Linux/Windows)
        if: matrix.name != 'macOS'
        run: |
          NAME="${{ env.PRODUCT_NAME }}-${{ env.VERSION_TAG }}-LuaJIT-${{ matrix.name }}"
          echo "ZIP_NAME=$NAME" >> $GITHUB_ENV

          rm -rf staging
          mkdir -p staging

          ARTEFACTS="${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}"

          if [ "${{ runner.os }}" == "Windows" ]; then
            cp -r "$ARTEFACTS/VST3" staging/                              || true
            find "$ARTEFACTS/Standalone" -name "*.exe" \
              -exec cp {} staging/ \;                                      || true
          else
            # Linux
            cp -r "$ARTEFACTS/VST3/"*.vst3 staging/                       || true
            cp    "$ARTEFACTS/Standalone/${{ env.PROJECT_NAME }}" staging/ || true
          fi

          if [ -z "$(ls -A staging)" ]; then
            echo "::error::staging/ is empty — no artefacts were found. Check the paths above."
            exit 1
          fi

          cd staging
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a "../${NAME}.zip" *
          else
            zip -r "../${NAME}.zip" .
          fi
          cd ..

      - name: Upload Artifacts (Linux/Windows)
        if: matrix.name != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}.zip

      - name: Upload Installer Package (macOS)
        if: matrix.name == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: Packaging/${{ env.ARTIFACT_NAME }}.pkg

  # -----------------------------------------------------------------------
  # Release job — triggered only on v* tags
  # -----------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs:
      - build_and_test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            ./artifacts/**/*.zip
            ./artifacts/**/*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}